name: release

# Publication strictement opt-in : un tag vX.Y.Z ou un dispatch manuel.
# JAMAIS push: main -- regle openweft [[feedback-no-autopublish-dev]] :
# pas d'autopublish pendant le dev, les artifacts ne sortent que sur
# action explicite.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: build openbsd/amd64
        run: GOOS=openbsd GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/weft-driver-vmd-openbsd-amd64 ./cmd/weft-driver-vmd
      - name: build openbsd/arm64
        run: GOOS=openbsd GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/weft-driver-vmd-openbsd-arm64 ./cmd/weft-driver-vmd
      - uses: actions/upload-artifact@v4
        with:
          name: weft-driver-vmd-${{ github.ref_name }}
          path: dist/
