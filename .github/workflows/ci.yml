name: ci

# Build + test sur push main et PR -- autorise.
# La publication d'artifacts vit dans release.yml, declenchee uniquement par
# workflow_dispatch ou tag v* -- regle openweft [[feedback-no-autopublish-dev]].
#
# Note : GitHub Actions n'offre pas de runner OpenBSD, donc la matrice
# cross-build se contente de verifier que le binaire compile pour
# openbsd/amd64 et openbsd/arm64 depuis un runner Linux. Les tests
# tournent sur linux/amd64 (les helpers args/host_info sont pure-Go
# hypervisor-agnostiques).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - run: go vet ./...
      - run: go test ./... -race

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos:   [openbsd, linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: build (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags '-s -w' ./...
